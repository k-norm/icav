spring:
  application:
    name: ICAV Backend
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  datasource:
    url: jdbc:mariadb://db:3306/icavdb
    username: icav
    password: icavpass
    driver-class-name: org.mariadb.jdbc.Driver

server:
  port: 8080
  servlet:
    context-path: /
