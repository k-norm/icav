# CI pipeline: lint, test, build, and conditional deploy to main/development

stages:
  - setup
  - lint
  - test
  - build
  - deploy

# -----------------------
# Frontend: setup, lint, test
# -----------------------
frontend-setup:
  stage: setup
  image: node:18
  cache:
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - '[ -f package-lock.json ] && npm ci || npm install'
  rules:
    - when: always

frontend-lint:
  stage: lint
  image: node:18
  script:
    - cd frontend
    - '[ -f package-lock.json ] && npm ci || npm install'
    - npm run lint --if-present
  rules:
    - when: always

frontend-test:
  stage: test
  image: node:18
  script:
    - cd frontend
    - '[ -f package-lock.json ] && npm ci || npm install'
    - CI=true npm test --if-present --silent -- --passWithNoTests --coverage
  artifacts:
    when: always
    reports:
      junit: frontend/test-results/*.xml
    paths:
      - frontend/coverage/
  rules:
    - when: always

# -----------------------
# Backend: lint, test, build
# -----------------------
backend-lint:
  stage: lint
  image: gradle:8-jdk17
  script:
    - cd backend
    - ./gradlew check -x checkstyleMain -x checkstyleTest
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - backend/.gradle/
  rules:
    - when: always

backend-test:
  stage: test
  image: gradle:8-jdk17
  coverage: '/Total.*?([0-9]{1,3})%/'
  script:
    - cd backend
    - ./gradlew test
    - awk -F "," '{ instructions += $4 + $5; covered += $5 } END { print covered, "/", instructions, " instructions covered"; print "Total coverage:", 100*covered/instructions,  "%"}' build/reports/jacoco/test/jacocoTestReport.csv
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/*.xml
    paths:
      - backend/build/test-results/
      - backend/build/reports/tests/
      - backend/build/reports/jacoco/test/jacocoTestReport.csv
  rules:
    - when: always

backend-build:
  stage: build
  image: gradle:8-jdk17
  script:
    - cd backend
    - ./gradlew clean bootJar
  artifacts:
    paths:
      - backend/build/libs/*.jar
  rules:
    - when: always

# ----------------------
# deploy to server (in progress)
# ----------------------

ci-deploy:
  stage: deploy
  image: alpine:3.18
  before_script:
    - apk add --no-cache openssh-client git
  variables:
    SSH_USER: "socs"
    DEPLOY_PATH: "~/icav"
  script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts || true
    - if [ -z "$SSH_USER" ] || [ -z "$SSH_HOST" ] || [ -z "$DEPLOY_PATH" ]; then echo "Missing SSH variables (SSH_USER, SSH_HOST, DEPLOY_PATH). Set them in CI/CD settings."; exit 1; fi
    - REPO_SSH="git@$(echo $CI_SERVER_URL | sed -E 's#https?://##' | sed -E 's#/$##'):${CI_PROJECT_PATH}.git"
    - |
      ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "set -e
        ; mkdir -p '$DEPLOY_PATH'
        ; if [ -d '$DEPLOY_PATH/.git' ]; then
            cd '$DEPLOY_PATH' && git fetch origin && git reset --hard origin/deployment;
          else
            git clone --branch deployment '$REPO_SSH' '$DEPLOY_PATH';
          fi
        ; cd '$DEPLOY_PATH'
        ; sudo docker compose -f compose.deploy.yaml pull
        ; sudo docker compose -f compose.deploy.yaml up -d"
  rules:
    - if: '$CI_COMMIT_BRANCH == "deployment"'
      when: manual
  allow_failure: false
  environment:
    name: saffron-production
    url: https://cis3760.socs.uoguelph.ca/saffron

